<!DOCTYPE html>
<html>
<head>
    <title>Belagavi Travel Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
</head>

<body class="{% if current_user.is_authenticated %}bottom-nav-safe{% endif %}">

    <nav class="navbar navbar-light border-bottom px-3 py-2 top-auth-nav shadow-sm" aria-label="Account">
        <a class="navbar-brand fw-bold text-primary mb-0 text-decoration-none"
           href="{% if current_user.is_authenticated %}{{ url_for('home') }}{% else %}{{ url_for('welcome') }}{% endif %}">
            <i class="fa-solid fa-map-location-dot me-2"></i>Belagavi
        </a>
        <div class="d-flex flex-wrap gap-2 align-items-center ms-auto">
            {% if current_user.is_authenticated %}
            {% if current_user.username.lower() == 'yuvaraj' %}
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-sm btn-warning fw-bold text-dark"><i class="fa-solid fa-screwdriver-wrench me-1"></i> Admin</a>
            {% endif %}
            <a href="{{ url_for('home') }}#profile" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-user me-1"></i> Profile</a>
            <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-primary">Login</a>
            <a href="{{ url_for('register') }}" class="btn btn-sm btn-primary">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container-fluid p-0">
        {% block content %}{% endblock %}
    </div>

    {% if current_user.is_authenticated %}
    <div class="bottom-nav">
        <button onclick="show('home')" id="nav-home" class="active"><i class="fa-solid fa-house"></i>Home</button>
        <button onclick="show('explore')" id="nav-explore"><i class="fa-solid fa-compass"></i>Explore</button>
        <button onclick="show('wishlist')" id="nav-wishlist"><i class="fa-solid fa-heart"></i>Saved</button>
        <button onclick="show('expense')" id="nav-expense"><i class="fa-solid fa-wallet"></i>Budget</button>
        <button onclick="show('profile')" id="nav-profile"><i class="fa-solid fa-user"></i>Profile</button>
    </div>


    {% endif %}

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('ServiceWorker registration successful'))
                    .catch(err => console.log('ServiceWorker registration failed', err));
            });
        }
    </script>
</body>
</html>
